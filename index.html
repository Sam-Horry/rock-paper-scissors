<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      text-align: center;
      margin-top: 40px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .scoreboard {
      font-size: 1.5rem;
      margin: 1rem 0;
      color: #333;
      font-weight: bold;
    }

    .result {
      font-size: 1.2rem;
      min-height: 1.5rem;
      margin: 1rem 0;
      color: #333;
    }

    .winner {
      font-size: 1.4rem;
      font-weight: bold;
      color: #007bff;
      margin: 1rem 0;
    }

    .buttons {
      margin: 1.8rem 0;
    }

    button {
      padding: 10px 20px;
      margin: 0 8px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
    }

    button:hover {
      color: navy;
    }

    #reset-btn {
      background: 6c757d;
      display: none;
      margin-top: 2rem;
    }
  </style>
</head>

<body>
  <h1>Rock Paper Scissors</h1>
  <h2>First to 5!</h2>
  <div class="scoreboard" id="scoreboard">Player: 0 | Computer: 0</div>
  <div class="result" id="result">Choose your weapon</div>

  <div class="buttons">
    <button id="rock-btn">Rock</button>
    <button id="paper-btn">Paper</button>
    <button id="scissors-btn">Scissors</button>
  </div>

  <div class="winner" id="winner"></div>
  <button id="reset-btn">Reset Game</button>

  <script src="rps.js"></script>
</body>

</html>
